name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_run:
    workflows:
      - "Auto Tag"
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_VERSION: "1.91"

permissions:
  contents: read

jobs:
  resolve-tag:
    name: Resolve release tag and SHA
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_release: ${{ steps.tag.outputs.should_release }}
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine tag and SHA
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
            if [[ -z "$SHA" ]]; then
              echo "Tag $TAG not found" >&2; exit 1
            fi
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG=$(git tag --points-at "$SHA" \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V | tail -n 1 || true)
            if [[ -z "$TAG" ]]; then
              echo "No semver tag found for workflow_run SHA $SHA; skipping release"
              {
                echo "should_release=false"
                echo "tag="
                echo "sha="
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SHA="${GITHUB_SHA}"
          fi

          {
            echo "should_release=true"
            echo "tag=$TAG"
            echo "sha=$SHA"
          } >> "$GITHUB_OUTPUT"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}
    steps:
      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.resolve-tag.outputs.sha }}
        run: |
          set -euo pipefail

          sha="${RELEASE_SHA}"
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" || "${ci_status}" != "completed" ]]; then
              sleep 20
              continue
            fi

            [[ "${ci_conclusion}" == "success" ]] && exit 0

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [resolve-tag, verify-ci]
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${{ needs.resolve-tag.outputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $TAG_VERSION"
            exit 1
          fi

      - name: Publish to crates.io (dry-run)
        run: cargo publish --dry-run

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-tag, verify-ci, publish]
    if: ${{ needs.resolve-tag.outputs.should_release == 'true' && needs.resolve-tag.outputs.tag != '' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.resolve-tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ needs.resolve-tag.outputs.sha }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-alpha') || contains(needs.resolve-tag.outputs.tag, '-beta') || contains(needs.resolve-tag.outputs.tag, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
