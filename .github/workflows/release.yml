name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  # workflow_dispatch receives a `tag` input but `github.ref` still points at
  # the branch you dispatched from, so synthesize refs/tags/<tag> for that path.
  # For tag pushes `github.ref` is already refs/tags/<tag>.
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

# Default-deny: each job opts in to the minimum permissions it needs.
permissions: {}

# Don't run two releases for the same tag in parallel.
concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          sha="${RELEASE_SHA}"
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  publish:
    name: Publish to crates.io
    needs: verify-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fetch the tag's commit, not just the default branch
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${RELEASE_REF#refs/tags/v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: Cargo.toml has $CARGO_VERSION, tag is $TAG_VERSION"
            exit 1
          fi

      - name: Publish to crates.io (dry-run)
        run: cargo publish --dry-run

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -o pipefail
          log=$(mktemp)
          trap 'rm -f "$log"' EXIT

          # Race-tolerant publish: a parallel/concurrent publish or a stale
          # crates.io index can cause "already exists" between pre-checks and
          # the actual upload. Treat that single error as a success.
          if cargo publish 2>&1 | tee "$log"; then
            echo "bevy_archie@${RELEASE_REF#refs/tags/v} published successfully"
            exit 0
          fi

          if grep -qE "already exists on crates.io" "$log"; then
            echo "bevy_archie@${RELEASE_REF#refs/tags/v} already published (treating as success)"
            exit 0
          fi

          echo "::error::cargo publish failed"
          exit 1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fetch the tag's commit for correct CHANGELOG extraction
          ref: ${{ env.RELEASE_REF }}
          persist-credentials: false

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${RELEASE_REF#refs/tags/v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[?$VERSION\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(env.RELEASE_REF, '-alpha') || contains(env.RELEASE_REF, '-beta') || contains(env.RELEASE_REF, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
